{% assign c = "c-page-heading" %}
<div class="container">
  {% if page.tag-name or page.folder-name %}
  <div class="tagheader">
    <p><ion-icon name="{{layout.tag-icon | default: 'pricetag'}}"></ion-icon> {{page.tag-name}}</p>
  </div>
  {% endif %}


  <div class="{{c}}">
    <h1 class="{{c}}__title">{{ include.title | default: page.title }}</h1>
    {% if include.description %}
      <p class="{{c}}__description">{{ include.description |  default: page.description }}</p>
    {% endif %}
  </div>
</div>
